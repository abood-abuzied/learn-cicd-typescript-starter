name: CD

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  Deploy:
    name: Deploy
    runs-on: ubuntu-latest

    # ✅ Add this
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build the app
      - name: Build app
        run: npm run build

      # 5️⃣ Authenticate gcloud
      - name: Authenticate gcloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # 6️⃣ Setup gcloud CLI
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: notely-489208

      # 7️⃣ Configure Docker
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # 8️⃣ Build and push Docker image
      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag us-central1-docker.pkg.dev/notely-489208/notely-ar-repo/notely-app:latest .

      # ✅ NEW STEP (run migrations)
      - name: Run DB migrations
        run: npm run db:migrate

      # 9️⃣ Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely \
            --image us-central1-docker.pkg.dev/notely-489208/notely-ar-repo/notely-app:latest \
            --region us-central1 \
            --allow-unauthenticated \
            --project notely-489208 \
            --max-instances=4