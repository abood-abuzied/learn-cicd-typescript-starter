name: CD

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: notely-489208

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/165223638257/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: cloud-run-deployer@notely-489208.iam.gserviceaccount.com
          export_default_credentials: true

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag us-central1-docker.pkg.dev/notely-489208/notely-ar-repo/notely-app:latest .