name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - run: npm ci

      # 4️⃣ Build the app
      - run: npm run build

      # 5️⃣ Authenticate gcloud using JSON key
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: notely-489208
          service_account_key: ${{ secrets.GCP_CREDENTIALS }}

      # 6️⃣ Configure Docker to push images
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # 7️⃣ Build and push Docker image
      - run: |
          gcloud builds submit \
            --tag us-central1-docker.pkg.dev/notely-489208/notely-ar-repo/notely-app:latest .